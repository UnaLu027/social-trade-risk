name: Refresh Monitoring Data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours at :00 UTC
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate monitoring JSON
        run: node scripts/refresh-monitoring-data.mjs
        env:
          HF_API_BASE: ${{ secrets.HF_API_BASE }}

      - name: Upload monitoring JSON via FTP
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          curl \
            --ftp-create-dirs \
            --silent \
            --show-error \
            --fail \
            -T generated-data/monitoring-latest.json \
            "ftp://${FTP_SERVER}/htdocs/data/monitoring-latest.json" \
            --user "${FTP_USERNAME}:${FTP_PASSWORD}"
          echo "[ftp] Upload complete"
