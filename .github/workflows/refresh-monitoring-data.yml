name: Refresh Monitoring Data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours at :00 UTC
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download previous monitoring JSON (for history continuity)
        # Downloads the current live file so the script can append to its history.
        # Uses FTPS (explicit TLS on port 21, --ssl-reqd). If the file does not
        # yet exist on the server (first run) or the download fails for any reason,
        # we log a warning and continue — the script handles a missing previous file.
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          mkdir -p generated-data
          if curl \
              --ssl-reqd \
              --silent \
              --fail \
              -o generated-data/monitoring-previous.json \
              "ftp://${FTP_SERVER}/htdocs/data/monitoring-latest.json" \
              --user "${FTP_USERNAME}:${FTP_PASSWORD}"; then
            echo "[ftp] Previous monitoring file downloaded for history"
          else
            echo "[ftp] Previous file not available (first run or transient error) — continuing without prior history"
            rm -f generated-data/monitoring-previous.json
          fi

      - name: Generate monitoring JSON
        run: node scripts/refresh-monitoring-data.mjs
        env:
          HF_API_BASE: ${{ secrets.HF_API_BASE }}

      - name: Upload monitoring JSON via FTPS
        # Uploads the generated file to InfinityFree using FTPS (explicit TLS).
        # --ssl-reqd enforces TLS so credentials are never sent in the clear.
        # --ftp-create-dirs creates /htdocs/data/ if it does not exist.
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          curl \
            --ssl-reqd \
            --ftp-create-dirs \
            --silent \
            --show-error \
            --fail \
            -T generated-data/monitoring-latest.json \
            "ftp://${FTP_SERVER}/htdocs/data/monitoring-latest.json" \
            --user "${FTP_USERNAME}:${FTP_PASSWORD}"
          echo "[ftp] Upload complete"
