name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"
        working-directory: backend

      - name: Retrain ML model (ensure pickle compatibility)
        run: python -m app.ml.train
        working-directory: backend

      - name: Train fake news model
        run: python -m app.ml.fakenews.train_fakenews
        working-directory: backend

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./test.db
          SCHEDULER_ENABLED: "false"
        run: pytest tests/ -v --tb=short
        working-directory: backend

  test-postgres:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt psycopg2-binary
        working-directory: backend

      - name: Run Alembic migrations against PostgreSQL
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        run: alembic upgrade head
        working-directory: backend

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"
        working-directory: backend

      - name: Retrain ML model (ensure pickle compatibility)
        run: python -m app.ml.train
        working-directory: backend

      - name: Train fake news model
        run: python -m app.ml.fakenews.train_fakenews
        working-directory: backend

      - name: Run tests against PostgreSQL
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          PERSONAL_WATCHLIST_TEST_DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          SCHEDULER_ENABLED: "false"
        run: pytest tests/ -v --tb=short
        working-directory: backend
